server {
    listen 80;
    server_name _;
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Only allow agent event submissions and health checks from known IPs
    # Add pilot company IP ranges here before deployment
    # allow 1.2.3.4;      # Pilot company 1
    # allow 5.6.7.8;      # Pilot company 2
    # deny all;           # Uncomment these two lines when IPs are known

    location /events {
        proxy_pass         http://engine:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    location /health {
        proxy_pass http://engine:8000;
    }

    # Dashboard and alerts — restrict to your IP only
    location / {
        # allow YOUR_IP;
        # deny all;
        proxy_pass http://engine:8000;
    }
}
